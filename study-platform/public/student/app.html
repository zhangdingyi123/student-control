<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习日历 - 学员打卡</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/student-calendar.css">
  <link rel="stylesheet" href="/css/reader.css">
  <link rel="stylesheet" href="/css/learn.css">
</head>
<body class="student-body">
  <header class="topbar student-topbar">
    <div class="topbar-brand">📅 <span>学习日历</span></div>
    <div class="topbar-user">
      <span class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">已同步</span></span>
      <span id="user-name" class="user-pill"></span>
      <button class="btn btn-sm btn-ghost" onclick="logout()">退出</button>
    </div>
  </header>

  <nav class="student-subnav">
    <a href="/student/app.html" class="active">📅 学习日历</a>
    <a href="/student/learn.html">📚 资料库</a>
  </nav>

  <div class="student-wrap">
    <div id="teacher-note-banner" class="teacher-note-banner" style="display:none;margin-bottom:0">
      <strong>👨‍🏫 教师寄语</strong>
      <span class="note-text"></span>
    </div>
    <!-- 概览 -->
    <section class="student-hero">
      <div class="hero-left">
        <p class="hero-greeting">你好，<strong id="hero-name"></strong></p>
        <h1 class="hero-plan" id="plan-name">学习计划</h1>
        <p class="hero-meta" id="hero-meta">—</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <span class="hero-stat-val" id="stat-done">0</span>
            <span class="hero-stat-label">已完成</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-val" id="stat-total">0</span>
            <span class="hero-stat-label">总任务</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-val" id="stat-today">—</span>
            <span class="hero-stat-label">今日进度</span>
          </div>
        </div>
      </div>
      <div class="hero-ring-wrap">
        <svg class="progress-ring" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"/>
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52"/>
        </svg>
        <div class="ring-center">
          <span class="ring-pct" id="pct-num">0%</span>
          <span class="ring-label">总进度</span>
        </div>
      </div>
    </section>

    <div class="student-main">
      <!-- 日历 -->
      <section class="calendar-card">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)" aria-label="上月">‹</button>
          <h2 class="cal-title" id="cal-title">2026年7月</h2>
          <button class="cal-nav" onclick="changeMonth(1)" aria-label="下月">›</button>
          <button class="btn btn-sm cal-today-btn" onclick="goToday()">今天</button>
        </div>
        <div class="cal-weekdays">
          <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-legend">
          <span><i class="dot dot-none"></i>无任务</span>
          <span><i class="dot dot-pending"></i>待完成</span>
          <span><i class="dot dot-partial"></i>进行中</span>
          <span><i class="dot dot-done"></i>已完成</span>
          <span><i class="dot dot-today"></i>今天</span>
        </div>
      </section>

      <!-- 当日任务面板 -->
      <aside class="day-panel" id="day-panel">
        <div class="day-panel-header">
          <div>
            <p class="day-panel-label" id="panel-label">第 1 天</p>
            <h3 class="day-panel-title" id="panel-title">选择日期查看任务</h3>
            <p class="day-panel-date" id="panel-date"></p>
          </div>
          <div class="day-panel-progress">
            <span id="panel-progress-text">0/0</span>
            <div class="mini-bar"><div class="mini-bar-fill" id="panel-bar" style="width:0%"></div></div>
          </div>
        </div>
        <div class="day-panel-body" id="panel-tasks">
          <p class="panel-empty">点击日历中有颜色的日期，查看并打卡当日任务</p>
        </div>
      </aside>
    </div>
  </div>

  <script src="/js/api.js?v=5"></script>
  <script src="/js/student-calendar.js?v=5"></script>
</body>
</html>
