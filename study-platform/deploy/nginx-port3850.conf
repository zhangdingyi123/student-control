# 学习计划平台 — 独立端口 3850（与旧项目 80/8088/9090 共存）
# 访问：http://47.97.176.185:3850/student/  http://47.97.176.185:3850/teacher/
# Node 仍监听 127.0.0.1:3847

server {
    listen 3850;
    listen [::]:3850;
    server_name 183ehjez.cn www.183ehjez.cn 185egugn.cn www.185egugn.cn 47.97.176.185 _;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
