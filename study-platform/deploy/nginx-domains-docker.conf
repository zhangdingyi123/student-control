# Docker 内 Nginx 反代到宿主机 Node :3850
# 容器名：zhibo-nginx
# 宿主机网关一般为 172.17.0.1，不行则改用 ECS 内网 IP（如 172.29.160.238）

upstream study_platform {
    server 172.17.0.1:3850;
}

server {
    listen 80;
    server_name 183ehjez.cn www.183ehjez.cn;

    location / {
        proxy_pass http://study_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name 185egugn.cn www.185egugn.cn;

    location / {
        proxy_pass http://study_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
