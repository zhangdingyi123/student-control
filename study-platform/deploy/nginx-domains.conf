# 学习计划平台 — Nginx 双域名
# 学员：183ehjez.cn   教师：185egugn.cn
# Node 监听 127.0.0.1:3847
# 服务器公网 IP：47.97.176.185（华东1 杭州）

# ── 学员端 ──
server {
    listen 80;
    listen [::]:80;
    server_name 183ehjez.cn www.183ehjez.cn;

    # certbot 会自动追加 443 与 ssl 配置
    # ssl_certificate     /etc/letsencrypt/live/183ehjez.cn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/183ehjez.cn/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── 教师端 ──
server {
    listen 80;
    listen [::]:80;
    server_name 185egugn.cn www.185egugn.cn;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
