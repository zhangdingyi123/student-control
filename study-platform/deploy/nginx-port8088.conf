# 学习计划平台 — 独立端口 8088（与旧项目 80 端口共存）
# 访问：http://47.97.176.185:8088/student/  http://47.97.176.185:8088/teacher/
# 域名解析后也可用：http://183ehjez.cn:8088/student/  http://185egugn.cn:8088/teacher/
# Node 仍监听 127.0.0.1:3847

server {
    listen 8088;
    listen [::]:8088;
    server_name 183ehjez.cn www.183ehjez.cn 185egugn.cn www.185egugn.cn 47.97.176.185 _;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
