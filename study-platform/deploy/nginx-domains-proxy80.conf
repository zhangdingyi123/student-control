# 域名反代到 Node（默认 3850），与旧项目共用 80 端口，按 Host 分流
# 学员：183ehjez.cn  教师：185egugn.cn
# 旧项目仍用 IP:80 默认站点，互不影响

upstream study_platform {
    server 127.0.0.1:3850;
}

server {
    listen 80;
    listen [::]:80;
    server_name 183ehjez.cn www.183ehjez.cn;

    location / {
        proxy_pass http://study_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name 185egugn.cn www.185egugn.cn;

    location / {
        proxy_pass http://study_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
